const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─── INDEXED DB ───────────────────────────────────────────────────────────────
// All blobs (audio, video, photos) go here — survives refresh, no size cap.
// localStorage only holds metadata (text, timestamps, idbKey references).

const IDB_NAME  = 'grounded_media';
const IDB_STORE = 'blobs';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess  = e => resolve(e.target.result);
    req.onerror    = () => reject(req.error);
  });
}
async function idbPut(key, blob) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(blob, key);
    tx.oncomplete = () => { db.close(); res(); };
    tx.onerror    = () => { db.close(); rej(tx.error); };
  });
}
async function idbGet(key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx  = db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => { db.close(); res(req.result); };
    req.onerror   = () => { db.close(); rej(req.error); };
  });
}
async function idbDelete(key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).delete(key);
    tx.oncomplete = () => { db.close(); res(); };
    tx.onerror    = () => { db.close(); rej(tx.error); };
  });
}
async function idbClear() {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).clear();
    tx.oncomplete = () => { db.close(); res(); };
    tx.onerror    = () => { db.close(); rej(tx.error); };
  });
}

// Hook: given an idbKey string, loads blob from IDB and returns a live object URL.
// URL is revoked on unmount. Returns null while loading.
function useIDBUrl(idbKey) {
  const [url, setUrl] = useState(null);
  useEffect(() => {
    if (!idbKey) { setUrl(null); return; }
    let objectUrl;
    idbGet(idbKey).then(blob => {
      if (blob) { objectUrl = URL.createObjectURL(blob); setUrl(objectUrl); }
      else       { setUrl(null); }
    }).catch(() => setUrl(null));
    return () => { if (objectUrl) URL.revokeObjectURL(objectUrl); };
  }, [idbKey]);
  return url;
}

// ─── LOCAL STORAGE (metadata only) ───────────────────────────────────────────
const LS_KEY  = 'grounded_v1';
const DEFAULTS = {
  memories:        [],   // { id, type, text, idbKey, timestamp, tags[] }
  medications:     [],   // { id, name, logs[] }
  anchorVideos:    [],   // { id, type, idbKey, timestamp }
  defaultAnchorId: null,
  safeMessage:     'You are safe.',
  groundingMessage:'Take a breath. You are here. This moment is real.',
  showSafeMessage: true,
  // ── Unified log ──────────────────────────────────────────────────────────
  // Single source of truth for every event. All features append here.
  // { id, timestamp, type, label, detail }
  logs: [],
  // ── Tasks / reminders ────────────────────────────────────────────────────
  // { id, timestamp, text, dueAt (epoch ms|null), completed, completedAt }
  tasks: [],
};

function useStore() {
  const [data, setData] = useState(() => {
    try { const s = localStorage.getItem(LS_KEY); return s ? { ...DEFAULTS, ...JSON.parse(s) } : { ...DEFAULTS }; }
    catch { return { ...DEFAULTS }; }
  });
  const update = useCallback((updater) => {
    setData(prev => {
      const next = typeof updater === 'function' ? updater(prev) : { ...prev, ...updater };
      try { localStorage.setItem(LS_KEY, JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);
  return [data, update];
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
// pushLog: append one event to the unified log. Call from any feature.
// type examples: 'note','voice','photo','video','med_taken','task_created',
//                'task_done','reminder_triggered'
function pushLog(update, type, label, detail='') {
  update(p => ({
    ...p,
    logs: [...(p.logs||[]), { id: Date.now().toString(), timestamp: Date.now(), type, label, detail }],
  }));
}
function useLiveClock() {
  const [t, setT] = useState(new Date());
  useEffect(() => { const id = setInterval(() => setT(new Date()), 1000); return () => clearInterval(id); }, []);
  return t;
}
const fmt = {
  time:    t => new Date(t).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }),
  date:    t => new Date(t).toLocaleDateString([], { weekday:'long', month:'long', day:'numeric' }),
  dateTime:t => new Date(t).toLocaleString([], { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }),
};

// ─── RECURRENCE ENGINE ───────────────────────────────────────────────────────
// task.recur: 'once' | 'daily' | 'weekdays' | 'weekly' | 'custom'
// task.days:  [0..6] (0=Sun) used by 'weekly' and 'custom'
// task.time:  'HH:MM' 24h string
// task.nextDueAt: epoch ms — when to next fire (computed here)

function parseTimeStr(hhmm) {
  if (!hhmm) return null;
  const [h,m] = hhmm.split(':').map(Number);
  return { h, m };
}

// Returns next epoch ms >= afterTime when this task should fire.
// Returns null if it should never fire again (once, already expired).
function computeNextDue(task, afterTime = Date.now()) {
  const t = parseTimeStr(task.time);
  if (!t) return null; // no time = no auto-trigger

  if (task.recur === 'once') {
    // Use task.onceDate if set (YYYY-MM-DD), else the creation day
    const base = task.onceDate ? new Date(task.onceDate + 'T00:00:00') : new Date(task.timestamp || afterTime);
    base.setHours(t.h, t.m, 0, 0);
    return base.getTime() > afterTime ? base.getTime() : null;
  }

  if (task.recur === 'daily') {
    const d = new Date(afterTime);
    d.setHours(t.h, t.m, 0, 0);
    if (d.getTime() <= afterTime) d.setDate(d.getDate() + 1);
    return d.getTime();
  }

  if (task.recur === 'weekdays') {
    for (let i = 0; i <= 7; i++) {
      const d = new Date(afterTime);
      d.setDate(d.getDate() + i);
      d.setHours(t.h, t.m, 0, 0);
      const dow = d.getDay();
      if (d.getTime() > afterTime && dow >= 1 && dow <= 5) return d.getTime();
    }
    return null;
  }

  if (task.recur === 'weekly') {
    // Single day weekly
    const targetDay = (task.days||[])[0];
    if (targetDay == null) return null;
    for (let i = 0; i <= 7; i++) {
      const d = new Date(afterTime);
      d.setDate(d.getDate() + i);
      d.setHours(t.h, t.m, 0, 0);
      if (d.getTime() > afterTime && d.getDay() === targetDay) return d.getTime();
    }
    return null;
  }

  if (task.recur === 'custom') {
    const days = task.days || [];
    if (!days.length) return null;
    for (let i = 0; i <= 7; i++) {
      const d = new Date(afterTime);
      d.setDate(d.getDate() + i);
      d.setHours(t.h, t.m, 0, 0);
      if (d.getTime() > afterTime && days.includes(d.getDay())) return d.getTime();
    }
    return null;
  }
  return null;
}

function recurLabel(task) {
  if (task.recur === 'once')     return 'One time';
  if (task.recur === 'daily')    return 'Every day';
  if (task.recur === 'weekdays') return 'Mon – Fri';
  if (task.recur === 'weekly')   {
    const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const d = (task.days||[])[0];
    return d != null ? `Every ${DAY_NAMES[d]}` : 'Weekly';
  }
  if (task.recur === 'custom') {
    const DAY_NAMES = ['Su','Mo','Tu','We','Th','Fr','Sa'];
    return (task.days||[]).map(d=>DAY_NAMES[d]).join(' · ') || 'Custom';
  }
  return '';
}

// Does this task apply to a given day-of-week (0=Sun)?
function taskOnDow(task, dow) {
  if (task.recur === 'daily')    return true;
  if (task.recur === 'weekdays') return dow >= 1 && dow <= 5;
  if (task.recur === 'weekly')   return (task.days||[]).includes(dow);
  if (task.recur === 'custom')   return (task.days||[]).includes(dow);
  return false;
}

// ─── SHARED COMPONENTS ────────────────────────────────────────────────────────
function Btn({ children, onClick, bg='#6aaf98', color='#fff', style={}, disabled }) {
  return (
    <button onClick={onClick} disabled={disabled} className="press flex items-center justify-center gap-2 rounded-2xl font-bold disabled:opacity-40"
      style={{ background:bg, color, padding:'15px 20px', boxShadow:'0 4px 18px rgba(0,0,0,0.10)', fontSize:16, ...style }}>

    </button>

}

function Header({ title, onBack }) {

    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'28px 20px 8px' }}>
      <button onClick={onBack} className="press" style={{ width:40, height:40, borderRadius:'50%', background:'#ede9e3', border:'none', display:'flex', alignItems:'center', justifyContent:'center' }}>

      <div style={{ width:40 }} />

// ── AlertBanner: soft in-app reminder notification, no harsh browser dialogs ──
function AlertBanner({ alerts, onDismiss }) {

  return (

      position:'fixed', top:0, left:'50%', transform:'translateX(-50%)',

      boxShadow:'0 4px 24px rgba(0,0,0,0.18)',
    }}>
      <div style={{ display:'flex', alignItems:'center', gap:12 }}>
        <span style={{ fontSize:28, flexShrink:0 }}>🔔</span>
        <div style={{ flex:1 }}>
          <p style={{ fontSize:13, fontWeight:800, color:'#5a3a00', letterSpacing:'0.06em' }}>REMINDER</p>
          <p style={{ fontSize:16, fontWeight:800, color:'#3a2000', lineHeight:1.3, marginTop:2 }}>{a.text}</p>
        </div>
        <button onClick={()=>onDismiss(a.id)} className="press"
          style={{ background:'rgba(255,255,255,0.35)', border:'none', borderRadius:50, width:36, height:36,
            display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, fontWeight:900, color:'#5a3a00', flexShrink:0 }}>
          ✓
        </button>
      </div>
      {alerts.length > 1 && (
        <p style={{ fontSize:12, color:'#7a5000', fontWeight:700, marginTop:6, textAlign:'center' }}>+{alerts.length-1} more</p>
      )}
    </div>
  );
}
  return (
    <button onClick={onClick} className="press"
      style={{ padding:'8px 14px', borderRadius:50, fontSize:13, fontWeight:700, border:'none',
        background: active ? tag.color : tag.bg, color: active ? '#fff' : tag.color }}>
      {tag.emoji} {tag.label}
    </button>
  );
}

// ── MediaPlayer: loads blob from IDB and renders the right element ────────────
function MediaPlayer({ idbKey, type, autoPlay=false, style={} }) {
  const src = useIDBUrl(idbKey);
  if (!idbKey) return null;
  if (!src) return <p style={{ color:'var(--muted)', fontSize:13, fontWeight:600, padding:'8px 0' }}>Loading…</p>;
  if (type === 'voice') return <audio controls src={src} />;
  if (type === 'video') return <video controls autoPlay={autoPlay} src={src} style={{ maxHeight:280, ...style }} />;
  if (type === 'photo') return <img src={src} alt="" style={{ width:'100%', borderRadius:12, maxHeight:280, objectFit:'cover', ...style }} />;
  return null;
}

// ── MemCard: tap to expand, renders media via MediaPlayer ─────────────────────
const MEM_ICON = { note:'📝', voice:'🎤', photo:'📷', video:'🎥' };

function MemCard({ mem, expanded, onToggle }) {
  return (
    <div onClick={onToggle} className="press" style={{ background:'#fff', borderRadius:18, marginBottom:10, boxShadow:'0 2px 14px rgba(0,0,0,0.065)', overflow:'hidden' }}>
      <div style={{ display:'flex', alignItems:'center', gap:12, padding:'14px 16px' }}>
        <span style={{ fontSize:22 }}>{MEM_ICON[mem.type] || '📝'}</span>
        <div style={{ flex:1, minWidth:0 }}>
          <p style={{ fontSize:14, fontWeight:600, color:'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
            {mem.type==='note' ? (mem.text||'—') : `${mem.type} recording`}
          </p>
          <p style={{ fontSize:12, color:'var(--muted)', marginTop:2 }}>{fmt.dateTime(mem.timestamp)}</p>
        </div>
        {(mem.tags||[]).slice(0,2).map(t => { const tag=TAGS.find(x=>x.id===t); return tag ? <span key={t} style={{ fontSize:16 }}>{tag.emoji}</span> : null; })}
      </div>
      {expanded && (
        <div className="fade-up" style={{ padding:'0 16px 16px' }}>
          {mem.type==='note'
            ? <p style={{ fontSize:15, lineHeight:1.7 }}>{mem.text}</p>
            : <MediaPlayer idbKey={mem.idbKey} type={mem.type} />
          }
          {(mem.tags||[]).length>0 && (
            <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginTop:10 }}>
              {mem.tags.map(t => { const tag=TAGS.find(x=>x.id===t); return tag ? <span key={t} style={{ fontSize:12, fontWeight:700, padding:'4px 10px', borderRadius:50, background:tag.bg, color:tag.color }}>{tag.emoji} {tag.label}</span> : null; })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── HOME ─────────────────────────────────────────────────────────────────────
function HomeScreen({ data, navigate }) {
  const now = useLiveClock();
  const recent = useMemo(() => [...data.memories].sort((a,b)=>b.timestamp-a.timestamp).slice(0,3), [data.memories]);
  const [expandedId, setExpandedId] = useState(null);

  // Today's upcoming scheduled tasks
  const todayUpcoming = useMemo(() => {
    const todayDow = new Date().getDay();
    const nowMs    = Date.now();
    return (data.tasks||[])
      .filter(t => t.active !== false && t.time && taskOnDow(t, todayDow))
      .filter(t => {
        // Only show ones that haven't fired yet today
        if (!t.nextDueAt) return true;
        return t.nextDueAt > nowMs || (t.nextDueAt && new Date(t.nextDueAt).toDateString() === new Date().toDateString());
      })
      .sort((a,b) => {
        const ta = parseTimeStr(a.time), tb = parseTimeStr(b.time);
        return (ta.h*60+ta.m) - (tb.h*60+tb.m);
      })
      .slice(0, 4);
  }, [data.tasks]);

  // Count of active reminders user set up
  const activeCount = (data.tasks||[]).filter(t=>t.active!==false).length;

  return (

// ─── ADD MEMORY ───────────────────────────────────────────────────────────────
function AddMemory({ data, update, navigate }) {
  const [mode, setMode]     = useState(null);
  const [text, setText]     = useState('');
  const [tags, setTags]     = useState([]);
  const [recording, setRec] = useState(false);
  // previewURL = blob:// for live display only; blob = raw data to write to IDB
  const [previewURL, setPrev] = useState(null);
  const [blob, setBlob]       = useState(null);
  const [saving, setSaving]   = useState(false);
  const [done,   setDone]     = useState(false);
  const vidRef   = useRef(null);
  const recRef   = useRef(null);
  const chunks   = useRef([]);
  const photoRef = useRef(null);

  function toggleTag(id) { setTags(p => p.includes(id) ? p.filter(t=>t!==id) : [...p, id]); }
  function reset() { setPrev(null); setBlob(null); }

  async function startRec(type) {
    try {
      const constraints = type==='video' ? { audio:true, video:{ facingMode:'user' } } : { audio:true };
      const s = await navigator.mediaDevices.getUserMedia(constraints);
      if (type==='video' && vidRef.current) { vidRef.current.srcObject=s; vidRef.current.play(); }
      chunks.current = [];
      const mime = type==='video' ? 'video/webm' : 'audio/webm';
      const rec  = new MediaRecorder(s, { mimeType: MediaRecorder.isTypeSupported(mime) ? mime : '' });
      rec.ondataavailable = e => chunks.current.push(e.data);
      rec.onstop = () => {
        const b   = new Blob(chunks.current, { type: mime });
        const url = URL.createObjectURL(b);
        setBlob(b); setPrev(url);
        if (type==='video' && vidRef.current) { vidRef.current.srcObject=null; vidRef.current.src=url; }
        s.getTracks().forEach(t=>t.stop());
      };
      rec.start(); recRef.current=rec; setRec(true);
    } catch { setPrev('__no_permission__'); }
  }

  function stopRec() { recRef.current?.stop(); setRec(false); }

  function handlePhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    setPrev(URL.createObjectURL(file));
    setBlob(file);
  }

  async function save() {
    if (mode==='note' && !text.trim()) return;
    if (mode!=='note' && (!blob || previewURL==='__no_permission__')) return;
    setSaving(true);
    const id = Date.now().toString();
    let idbKey = null;
    if (mode !== 'note') {
      idbKey = `mem_${id}`;
      await idbPut(idbKey, blob);
    }
    const mem = { id, type:mode, text: mode==='note' ? text.trim() : '', idbKey, timestamp:Date.now(), tags };
    // Derive a readable label for the log
    const logLabel = mode==='note'
      ? (text.trim().slice(0,60) + (text.trim().length>60?'…':''))
      : `${mode} recording`;
    update(p => ({
      ...p,
      memories: [...p.memories, mem],
      // Auto-append to unified log
      logs: [...(p.logs||[]), { id: `log_${id}`, timestamp: Date.now(), type: mode, label: logLabel, detail: '' }],
    }));
    setDone(true);
    setTimeout(()=>navigate('home'), 900);
  }

  if (done) return (
    <div className="pop-in" style={{ minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', background:'var(--sage-l)', gap:16 }}>
      <div style={{ width:72, height:72, borderRadius:'50%', background:'#6aaf98', display:'flex', alignItems:'center', justifyContent:'center' }}>
        <span style={{ width:36, height:36, color:'#fff' }}><I.Check /></span>
      </div>
      <p style={{ fontSize:22, fontWeight:800, color:'#3d8a72' }}>Saved ✓</p>
    </div>
  );

  const labels  = { note:'Write Note', voice:'Record Voice', photo:'Take Photo', video:'Record Video' };
  const canSave = mode==='note' ? text.trim().length>0 : (!!blob && previewURL!=='__no_permission__');

  return (
    <div className="fade-up" style={{ minHeight:'100vh', background:'var(--bg)', paddingBottom:100 }}>
      <Header title={mode ? labels[mode] : 'Add Memory'} onBack={()=>{ if(mode){setMode(null);reset();}else navigate('home'); }} />

      {!mode && (
        <div style={{ padding:'12px 16px 0', display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
          {[
            { id:'voice', label:'Record Voice', icon:<I.Mic />,    bg:'#fde8ef', color:'#c0507a' },
            { id:'note',  label:'Write Note',   icon:<I.Pen />,    bg:'#e3eef8', color:'#4a80b0' },
            { id:'photo', label:'Take Photo',   icon:<I.Camera />, bg:'#e4f2ec', color:'#3d8a72' },
            { id:'video', label:'Record Video', icon:<I.Video />,  bg:'#faf0d8', color:'#a87030' },
          ].map((opt,i) => (
            <button key={opt.id} onClick={()=>setMode(opt.id)} className="press"
              style={{ background:opt.bg, borderRadius:22, padding:'28px 16px', display:'flex', flexDirection:'column',
                alignItems:'center', gap:12, border:'none', animation:`fadeUp 0.25s ${i*0.06}s ease both` }}>
              <span style={{ width:36, height:36, color:opt.color }}>{opt.icon}</span>
              <span style={{ fontSize:15, fontWeight:800, color:opt.color }}>{opt.label}</span>
            </button>
          ))}
        </div>
      )}

      {mode && (
        <div style={{ padding:'12px 16px 0', display:'flex', flexDirection:'column', gap:16 }}>

          {/* NOTE */}
          {mode==='note' && (
            <textarea autoFocus value={text} onChange={e=>setText(e.target.value)} placeholder="What's on your mind…" rows={6}
              style={{ width:'100%', background:'#fff', border:'2px solid var(--border)', borderRadius:18, padding:16,
                fontSize:16, lineHeight:1.6, color:'var(--text)', resize:'none', outline:'none', fontFamily:'Nunito,sans-serif' }} />
          )}

          {/* VOICE */}
          {mode==='voice' && (
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:16, padding:'20px 0' }}>
              {previewURL==='__no_permission__'
                ? <p style={{ color:'var(--rose)', fontWeight:700, textAlign:'center', padding:'0 24px' }}>Microphone access needed. Allow it in browser settings.</p>
                : blob ? (
                  <>
                    <audio controls src={previewURL} style={{ width:'100%' }} />
                    <button onClick={reset} className="press" style={{ fontSize:13, color:'var(--muted)', background:'none', border:'none', fontWeight:700 }}>Re-record</button>
                  </>
                ) : (
                  <>
                    <button onPointerDown={()=>startRec('voice')} onPointerUp={stopRec} onPointerLeave={recording?stopRec:undefined} className="press"
                      style={{ width:120, height:120, borderRadius:'50%', border:'none',
                        background: recording ? '#e87878' : '#fde8ef',
                        boxShadow:  recording ? '0 0 0 12px #e8787830' : '0 6px 24px rgba(0,0,0,0.12)',
                        display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.2s' }}>
                      <span style={{ width:48, height:48, color: recording ? '#fff' : '#c0507a' }}><I.Mic /></span>
                    </button>
                    <p style={{ fontSize:13, color:'var(--muted)', fontWeight:700 }}>
                      {recording ? <span className="pulse-anim">● Recording… release to stop</span> : 'Hold to record'}
                    </p>
                  </>
                )
              }
            </div>
          )}

          {/* VIDEO */}
          {mode==='video' && (
            <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
              {previewURL==='__no_permission__'
                ? <p style={{ color:'var(--rose)', fontWeight:700, textAlign:'center' }}>Camera access needed.</p>
                : <video ref={vidRef} controls={!!blob} autoPlay={!blob} muted={!blob} style={{ borderRadius:18, background:'#111', minHeight:220, maxHeight:320 }} />
              }
              {!blob && previewURL!=='__no_permission__' && (
                <Btn onClick={recording ? stopRec : ()=>startRec('video')} bg={recording?'#e87878':'#6da0c8'} style={{ width:'100%' }}>
                  {recording ? '⏹ Stop Recording' : '⏺ Start Recording'}
                </Btn>
              )}
              {blob && <button onClick={reset} className="press" style={{ fontSize:13, color:'var(--muted)', background:'none', border:'none', fontWeight:700, alignSelf:'center' }}>Re-record</button>}
            </div>
          )}

          {/* PHOTO */}
          {mode==='photo' && (
            <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
              {blob ? (
                <>
                  <img src={previewURL} alt="" style={{ width:'100%', borderRadius:18, maxHeight:300, objectFit:'cover' }} />
                  <button onClick={()=>{reset();if(photoRef.current)photoRef.current.value='';}} className="press"
                    style={{ fontSize:13, color:'var(--muted)', background:'none', border:'none', fontWeight:700, alignSelf:'center' }}>Retake</button>
                </>
              ) : (
                <button onClick={()=>photoRef.current?.click()} className="press"
                  style={{ borderRadius:18, border:'2px dashed #9ab890', background:'#e4f2ec', padding:'40px 20px',
                    display:'flex', flexDirection:'column', alignItems:'center', gap:10 }}>
                  <span style={{ width:40, height:40, color:'#3d8a72' }}><I.Camera /></span>
                  <span style={{ fontSize:15, fontWeight:800, color:'#3d8a72' }}>Tap to take a photo</span>
                </button>
              )}
              <input ref={photoRef} type="file" accept="image/*" capture="environment" onChange={handlePhoto} style={{ display:'none' }} />
            </div>
          )}

          {/* TAGS */}
          <div>
            <p style={{ fontSize:12, fontWeight:800, color:'var(--muted)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:8 }}>Tag it (optional)</p>
            <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
              {TAGS.map(t => <TagChip key={t.id} tag={t} active={tags.includes(t.id)} onClick={()=>toggleTag(t.id)} />)}
            </div>
          </div>

          <Btn onClick={save} bg='#6aaf98' disabled={!canSave||saving} style={{ width:'100%', marginTop:4 }}>
            {saving ? <span className="pulse-anim">Saving…</span> : <><span style={{ width:20, height:20 }}><I.Check /></span> Save Memory</>}
          </Btn>
        </div>
      )}
    </div>
  );
}

// ─── UNIFIED TIMELINE ─────────────────────────────────────────────────────────
// Merges memories + logs + tasks into one sorted feed. Single source of truth.

const LOG_META = {
  note:                { emoji:'📝', label:'NOTE',      color:'#6da0c8', bg:'#e3eef8' },
  voice:               { emoji:'🎤', label:'VOICE',     color:'#c0507a', bg:'#fde8ef' },
  photo:               { emoji:'📷', label:'PHOTO',     color:'#3d8a72', bg:'#e4f2ec' },
  video:               { emoji:'🎥', label:'VIDEO',     color:'#a87030', bg:'#faf0d8' },
  med_taken:           { emoji:'💊', label:'MED',       color:'#9a7ec8', bg:'#f0eafa' },
  task_created:        { emoji:'🔔', label:'REMINDER',  color:'#d4a84b', bg:'#faf0d8' },
  reminder_triggered:  { emoji:'⏰', label:'ALERT',     color:'#d47a7a', bg:'#faeaea' },
  task_done:           { emoji:'✅', label:'DONE',      color:'#6aaf98', bg:'#e4f2ec' },
};

function UnifiedTimeline({ data, navigate }) {
  const [expandedId, setExpanded] = useState(null);
  const toggle = id => setExpanded(p=>p===id?null:id);

  // Build combined feed from logs (every feature appends here) + any tasks events
  const feed = useMemo(() => {
    const entries = [...(data.logs||[])];
    // Add task completions that might not be in logs (backwards compat)
    (data.tasks||[]).forEach(t => {
      if (t.completedAt && !entries.find(e=>e.id===`taskdone_${t.id}`)) {
        entries.push({ id:`taskdone_${t.id}`, timestamp:t.completedAt, type:'task_done', label:t.text, detail:'' });
      }
    });
    return entries.sort((a,b)=>b.timestamp-a.timestamp);
  }, [data.logs, data.tasks]);

  const today    = new Date().toDateString();
  const todayF   = feed.filter(e => new Date(e.timestamp).toDateString()===today);
  const olderF   = feed.filter(e => new Date(e.timestamp).toDateString()!==today);

  function LogRow({ entry }) {
    const meta = LOG_META[entry.type] || { emoji:'📋', label: entry.type.toUpperCase(), color:'var(--muted)', bg:'#f0ece8' };
    // If it's a memory type and expanded, render the full MemCard
    const mem = (entry.type==='note'||entry.type==='voice'||entry.type==='photo'||entry.type==='video')
      ? data.memories.find(m=>m.timestamp===entry.timestamp || `log_${m.id}`===entry.id)
      : null;
    const isExp = expandedId===entry.id;
    return (
      <div onClick={()=>mem&&toggle(entry.id)} className={mem?'press':''} style={{ background:'#fff', borderRadius:18, marginBottom:8, boxShadow:'0 2px 12px rgba(0,0,0,0.055)', overflow:'hidden' }}>
        <div style={{ display:'flex', alignItems:'center', gap:12, padding:'12px 14px' }}>
          {/* Time */}
          <span style={{ fontSize:12, fontWeight:800, color:'var(--muted)', minWidth:50, flexShrink:0 }}>
            {fmt.time(entry.timestamp)}
          </span>
          {/* Type badge */}
          <span style={{ fontSize:11, fontWeight:800, padding:'3px 8px', borderRadius:50, background:meta.bg, color:meta.color, flexShrink:0 }}>
            {meta.emoji} {meta.label}
          </span>
          {/* Detail */}
          <p style={{ fontSize:13, fontWeight:600, color:'var(--text)', flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
            {entry.label || entry.detail || '—'}
          </p>
        </div>
        {isExp && mem && (
          <div className="fade-up" style={{ padding:'0 14px 14px' }}>
            {mem.type==='note'
              ? <p style={{ fontSize:14, lineHeight:1.7 }}>{mem.text}</p>
              : <MediaPlayer idbKey={mem.idbKey} type={mem.type} />
            }
            {(mem.tags||[]).length>0 && (
              <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginTop:10 }}>
                {mem.tags.map(t => { const tag=TAGS.find(x=>x.id===t); return tag ? <span key={t} style={{ fontSize:12, fontWeight:700, padding:'3px 9px', borderRadius:50, background:tag.bg, color:tag.color }}>{tag.emoji} {tag.label}</span> : null; })}
              </div>
            )}
          </div>
        )}
      </div>
    );
  }

  return (
    <div className="fade-up" style={{ minHeight:'100vh', paddingBottom:90 }}>
      <Header title="Timeline" onBack={()=>navigate('home')} />
      <div style={{ padding:'4px 16px 0' }}>
        <p style={{ fontSize:12, fontWeight:800, color:'var(--muted)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:10 }}>{fmt.date(Date.now())}</p>
        {todayF.length===0 && (
          <div style={{ textAlign:'center', padding:'28px 0' }}>
            <p style={{ fontSize:36 }}>🌿</p>
            <p style={{ color:'var(--muted)', fontWeight:700, marginTop:8 }}>Nothing logged today</p>
          </div>
        )}
        {todayF.map(e => <LogRow key={e.id} entry={e} />)}
        {olderF.length>0 && (
          <>
            <p style={{ fontSize:12, fontWeight:800, color:'var(--muted)', letterSpacing:'0.08em', textTransform:'uppercase', margin:'14px 0 10px' }}>Earlier</p>
            {olderF.map(e => <LogRow key={e.id} entry={e} />)}
          </>
        )}
        {feed.length===0 && (
          <p style={{ textAlign:'center', color:'var(--muted)', fontWeight:600, marginTop:40 }}>
            Every note, medication, and reminder will appear here.
          </p>
        )}
      </div>
    </div>
  );
}

// ─── REMINDERS ────────────────────────────────────────────────────────────────
// task schema: { id, timestamp, text, recur, days[], time, onceDate,
//               nextDueAt, lastFiredAt, active }
// Timer engine lives in App so it fires on any screen.
// This component is purely UI — add/edit/delete/complete tasks.

const DAY_NAMES_FULL  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAY_NAMES_SHORT = ['Su','Mo','Tu','We','Th','Fr','Sa'];
const RECUR_OPTIONS   = [
  { id:'once',     label:'Once' },
  { id:'daily',    label:'Every day' },
  { id:'weekdays', label:'Mon – Fri' },
  { id:'weekly',   label:'Weekly' },
  { id:'custom',   label:'Custom days' },
];

function Reminders({ data, update, navigate }) {
  const [showAdd, setShowAdd]   = useState(false);
  const [text, setText]         = useState('');
  const [recur, setRecur]       = useState('daily');
  const [days, setDays]         = useState([]);      // for weekly/custom
  const [time, setTime]         = useState('08:00');
  const [useTime, setUseTime]   = useState(true);
  const [onceDate, setOnceDate] = useState('');      // YYYY-MM-DD for 'once'

  const active    = (data.tasks||[]).filter(t=>t.active!==false).sort((a,b)=>{
    const ta=parseTimeStr(a.time)||{h:99,m:99}, tb=parseTimeStr(b.time)||{h:99,m:99};
    return (ta.h*60+ta.m)-(tb.h*60+tb.m);
  });
  const inactive  = (data.tasks||[]).filter(t=>t.active===false).sort((a,b)=>b.timestamp-a.timestamp).slice(0,10);

  function toggleDay(d) { setDays(p=>p.includes(d)?p.filter(x=>x!==d):[...p,d]); }

  function closeForm() { setShowAdd(false); setText(''); setRecur('daily'); setDays([]); setTime('08:00'); setUseTime(true); setOnceDate(''); }

  function addTask() {
    if (!text.trim()) return;
    const ts   = Date.now();
    const id   = ts.toString();
    const taskDays = recur==='weekly'   ? days.slice(0,1)   // one day for weekly
                   : recur==='custom'   ? days
                   : [];
    const task = {
      id, timestamp:ts, text:text.trim(), recur,
      days: taskDays,
      time: useTime ? time : null,
      onceDate: recur==='once' ? (onceDate || new Date().toISOString().slice(0,10)) : null,
      active: true, lastFiredAt: null,
      nextDueAt: null, // computed below
    };
    task.nextDueAt = computeNextDue(task, ts - 1000); // allow immediate if today
    update(p=>({
      ...p,
      tasks:[...(p.tasks||[]),task],
      logs:[...(p.logs||[]),{ id:`log_tc_${id}`, timestamp:ts, type:'task_created', label:task.text, detail: recurLabel(task)+(task.time?` at ${task.time}`:'') }],
    }));
    closeForm();
  }

  function deactivateTask(id) { update(p=>({...p,tasks:p.tasks.map(t=>t.id===id?{...t,active:false,nextDueAt:null}:t)})); }
  function reactivateTask(task) {
    const next = computeNextDue(task, Date.now());
    update(p=>({...p,tasks:p.tasks.map(t=>t.id===task.id?{...t,active:true,nextDueAt:next}:t)}));
  }
  function deleteTask(id) { update(p=>({...p,tasks:(p.tasks||[]).filter(t=>t.id!==id)})); }

  return (
    <div className="fade-up" style={{ minHeight:'100vh', paddingBottom:100 }}>
      <Header title="Reminders" onBack={()=>navigate('home')} />
      <div style={{ padding:'8px 16px', display:'flex', flexDirection:'column', gap:12 }}>

        {!showAdd ? (
          <Btn onClick={()=>setShowAdd(true)} bg='var(--amber)' style={{ width:'100%' }}>
            <span style={{ width:20, height:20 }}><I.Plus /></span> Add Reminder
          </Btn>
        ) : (
          <div style={{ background:'#fff', borderRadius:20, padding:16, boxShadow:'0 2px 14px rgba(0,0,0,0.065)', display:'flex', flexDirection:'column', gap:12 }}>
            <textarea autoFocus value={text} onChange={e=>setText(e.target.value)}
              placeholder="What do you need to remember?" rows={2}
              style={{ width:'100%', border:'2px solid var(--border)', borderRadius:14, padding:'12px 14px', fontSize:15, color:'var(--text)', outline:'none', fontFamily:'Nunito,sans-serif', resize:'none', background:'#f9f6f2' }} />

            {/* Recurrence */}
            <div>
              <p style={{ fontSize:11, fontWeight:800, color:'var(--muted)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:6 }}>Repeat</p>
              <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                {RECUR_OPTIONS.map(opt => (
                  <button key={opt.id} onClick={()=>{setRecur(opt.id);setDays([]);}} className="press"
                    style={{ padding:'7px 14px', borderRadius:50, fontSize:13, fontWeight:800, border:'none',
                      background: recur===opt.id ? 'var(--amber)' : 'var(--amber-l)',
                      color:      recur===opt.id ? '#fff' : '#a87030' }}>
                    {opt.label}
                  </button>
                ))}
              </div>
            </div>

            {/* Weekly: pick one day */}
            {recur==='weekly' && (
              <div>
                <p style={{ fontSize:11, fontWeight:800, color:'var(--muted)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:6 }}>Which day</p>
                <div style={{ display:'flex', gap:6 }}>
                  {[0,1,2,3,4,5,6].map(d => (
                    <button key={d} onClick={()=>setDays([d])} className="press"
                      style={{ flex:1, padding:'8px 2px', borderRadius:10, border:'none', fontSize:12, fontWeight:800,
                        background: days[0]===d ? 'var(--amber)' : 'var(--amber-l)',
                        color:      days[0]===d ? '#fff' : '#a87030' }}>
                      {DAY_NAMES_SHORT[d]}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Custom: pick multiple days */}
            {recur==='custom' && (
              <div>
                <p style={{ fontSize:11, fontWeight:800, color:'var(--muted)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:6 }}>Which days</p>
                <div style={{ display:'flex', gap:6 }}>
                  {[0,1,2,3,4,5,6].map(d => (
                    <button key={d} onClick={()=>toggleDay(d)} className="press"
                      style={{ flex:1, padding:'8px 2px', borderRadius:10, border:'none', fontSize:12, fontWeight:800,
                        background: days.includes(d) ? 'var(--amber)' : 'var(--amber-l)',
                        color:      days.includes(d) ? '#fff' : '#a87030' }}>
                      {DAY_NAMES_SHORT[d]}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Once: pick date */}
            {recur==='once' && (
              <div>
                <p style={{ fontSize:11, fontWeight:800, color:'var(--muted)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:6 }}>Date</p>
                <input type="date" value={onceDate} onChange={e=>setOnceDate(e.target.value)}
                  style={{ border:'2px solid var(--border)', borderRadius:12, padding:'10px 14px', fontSize:15, color:'var(--text)', outline:'none', fontFamily:'Nunito,sans-serif', background:'#fff', width:'100%' }} />
              </div>
            )}

            {/* Time */}
            <div>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:6 }}>
                <p style={{ fontSize:11, fontWeight:800, color:'var(--muted)', letterSpacing:'0.08em', textTransform:'uppercase' }}>Time</p>
                <button onClick={()=>setUseTime(p=>!p)} className="press"
                  style={{ fontSize:12, fontWeight:800, padding:'4px 12px', borderRadius:50, border:'none',
                    background: useTime ? 'var(--amber)' : '#ede9e3',
                    color:      useTime ? '#fff' : 'var(--muted)' }}>
                  {useTime ? 'On' : 'Off'}
                </button>
              </div>
              {useTime && (
                <input type="time" value={time} onChange={e=>setTime(e.target.value)}
                  style={{ width:'100%', border:'2px solid var(--border)', borderRadius:12, padding:'10px 14px', fontSize:16, color:'var(--text)', outline:'none', fontFamily:'Nunito,sans-serif', background:'#fff' }} />
              )}
            </div>

            <div style={{ display:'flex', gap:8 }}>
              <Btn onClick={addTask} bg='var(--amber)' disabled={!text.trim() || (recur==='weekly'&&!days.length) || (recur==='custom'&&!days.length)} style={{ flex:1 }}>
                <span style={{ width:18, height:18 }}><I.Check /></span> Save
              </Btn>
              <Btn onClick={closeForm} bg='#ede9e3' color='var(--muted)' style={{ padding:'12px 16px' }}>✕</Btn>
            </div>
          </div>
        )}

        {/* Active reminders */}
        {active.length===0 && !showAdd && (
          <div style={{ textAlign:'center', padding:'32px 0', display:'flex', flexDirection:'column', alignItems:'center', gap:10 }}>
            <span style={{ fontSize:44 }}>🔔</span>
            <p style={{ color:'var(--muted)', fontWeight:700 }}>No active reminders</p>
            <p style={{ color:'var(--muted)', fontSize:13, fontWeight:600, maxWidth:240, textAlign:'center' }}>Add a daily medication reminder, weekly appointment, or any recurring event.</p>
          </div>
        )}

        {active.map(task => {
          const nextStr = task.nextDueAt ? fmt.dateTime(task.nextDueAt) : (task.time ? 'Scheduled' : 'No time set');
          return (
            <div key={task.id} style={{ background:'#fff', borderRadius:20, padding:16, boxShadow:'0 2px 14px rgba(0,0,0,0.065)' }}>
              <div style={{ display:'flex', alignItems:'flex-start', gap:10, marginBottom:12 }}>
                <div style={{ flex:1, minWidth:0 }}>
                  <p style={{ fontSize:16, fontWeight:800, color:'var(--text)', lineHeight:1.3 }}>{task.text}</p>
                  <p style={{ fontSize:12, color:'var(--amber)', fontWeight:800, marginTop:4 }}>
                    🔁 {recurLabel(task)}{task.time ? ` at ${task.time}` : ''}
                  </p>
                  <p style={{ fontSize:11, color:'var(--muted)', fontWeight:600, marginTop:2 }}>Next: {nextStr}</p>
                </div>
                <button onClick={()=>deactivateTask(task.id)} className="press"
                  style={{ background:'var(--rose-l)', borderRadius:10, border:'none', width:32, height:32, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  <span style={{ width:15, height:15, color:'var(--rose)' }}><I.Trash /></span>
                </button>
              </div>
            </div>
          );
        })}

        {/* Inactive / completed */}
        {inactive.length>0 && (
          <>
            <p style={{ fontSize:12, fontWeight:800, color:'var(--muted)', letterSpacing:'0.08em', textTransform:'uppercase', marginTop:4 }}>Inactive</p>
            {inactive.map(task => (
              <div key={task.id} style={{ background:'#fff', borderRadius:16, padding:'12px 16px', boxShadow:'0 1px 8px rgba(0,0,0,0.05)', display:'flex', alignItems:'center', gap:12, opacity:0.7 }}>
                <span style={{ fontSize:16 }}>🔕</span>
                <div style={{ flex:1, minWidth:0 }}>
                  <p style={{ fontSize:14, fontWeight:700, color:'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{task.text}</p>
                  <p style={{ fontSize:11, color:'var(--muted)', fontWeight:600 }}>{recurLabel(task)}</p>
                </div>
                <div style={{ display:'flex', gap:6 }}>
                  <button onClick={()=>reactivateTask(task)} className="press"
                    style={{ background:'var(--sage-l)', borderRadius:10, border:'none', width:32, height:32, display:'flex', alignItems:'center', justifyContent:'center' }}>
                    <span style={{ width:15, height:15, color:'#3d8a72' }}><I.Check /></span>
                  </button>
                  <button onClick={()=>deleteTask(task.id)} className="press"
                    style={{ background:'var(--rose-l)', borderRadius:10, border:'none', width:32, height:32, display:'flex', alignItems:'center', justifyContent:'center' }}>
                    <span style={{ width:14, height:14, color:'var(--rose)' }}><I.Trash /></span>
                  </button>
                </div>
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

function AnchorVideos({ data, update, navigate }) {
  const [showAdd, setShowAdd] = useState(false);
  const [recType, setRecType] = useState('morning');
  const [recording, setRec]  = useState(false);
  const [previewURL, setPrev] = useState(null);
  const [blob, setBlob]       = useState(null);
  const [saving, setSaving]   = useState(false);
  const vidRef = useRef(null);
  const recRef = useRef(null);
  const chunks = useRef([]);

  function reset() { setPrev(null); setBlob(null); }

  async function startRec() {
    try {
      const s = await navigator.mediaDevices.getUserMedia({ audio:true, video:{ facingMode:'user' } });
      if (vidRef.current) { vidRef.current.srcObject=s; vidRef.current.play(); }
      chunks.current = [];
      const rec = new MediaRecorder(s);
      rec.ondataavailable = e => chunks.current.push(e.data);
      rec.onstop = () => {
        const b   = new Blob(chunks.current, { type:'video/webm' });
        const url = URL.createObjectURL(b);
        setBlob(b); setPrev(url);
        if (vidRef.current) { vidRef.current.srcObject=null; vidRef.current.src=url; }
        s.getTracks().forEach(t=>t.stop());
      };
      rec.start(); recRef.current=rec; setRec(true);
    } catch { setPrev('__no_permission__'); }
  }

  function stopRec() { recRef.current?.stop(); setRec(false); }

  async function saveVideo() {
    if (!blob || previewURL==='__no_permission__') return;
    setSaving(true);
    const id     = Date.now().toString();
    const idbKey = `anchor_${id}`;
    await idbPut(idbKey, blob);  // persist to IndexedDB
    const v = { id, type:recType, idbKey, timestamp:Date.now() };
    update(p => ({
      ...p,
      anchorVideos:    [...(p.anchorVideos||[]), v],
      defaultAnchorId: p.defaultAnchorId || v.id,
    }));
    setShowAdd(false); reset(); setSaving(false);
  }

  async function del(v) {
    if (v.idbKey) await idbDelete(v.idbKey).catch(()=>{});
    update(p => ({
      ...p,
      anchorVideos:    p.anchorVideos.filter(x=>x.id!==v.id),
      defaultAnchorId: p.defaultAnchorId===v.id ? null : p.defaultAnchorId,
    }));
  }

  const types = ['morning','confused','scared','general'];

  return (
    <div className="fade-up" style={{ minHeight:'100vh', paddingBottom:100 }}>
      <Header title="Anchor Videos" onBack={()=>navigate('home')} />
      <div style={{ padding:'8px 16px', display:'flex', flexDirection:'column', gap:14 }}>
        <p style={{ fontSize:14, color:'var(--muted)', fontWeight:600, lineHeight:1.5 }}>
          Record a message to yourself for moments when you feel lost or confused.
        </p>
        {!showAdd && (
          <Btn onClick={()=>setShowAdd(true)} bg='var(--plum)' style={{ width:'100%' }}>
            <span style={{ width:20, height:20 }}><I.Plus /></span> Add Anchor Video
          </Btn>
        )}
        {showAdd && (
          <div style={{ background:'#fff', borderRadius:20, padding:16, boxShadow:'0 2px 14px rgba(0,0,0,0.065)', display:'flex', flexDirection:'column', gap:12 }}>
            <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
              {types.map(t => (
                <button key={t} onClick={()=>setRecType(t)} className="press"
                  style={{ padding:'8px 14px', borderRadius:50, fontSize:13, fontWeight:700, border:'none',
                    textTransform:'capitalize',
                    background: recType===t ? 'var(--plum)' : 'var(--plum-l)',
                    color:       recType===t ? '#fff' : 'var(--plum)' }}>
                  {t}
                </button>
              ))}
            </div>
            {previewURL==='__no_permission__'
              ? <p style={{ color:'var(--rose)', fontWeight:700, textAlign:'center', fontSize:14 }}>Camera access needed.</p>
              : <video ref={vidRef} controls={!!blob} autoPlay={!blob} muted={!blob} style={{ borderRadius:14, background:'#111', minHeight:180 }} />
            }
            <div style={{ display:'flex', gap:8 }}>
              {!blob ? (
                <Btn onClick={recording ? stopRec : startRec} bg={recording?'#e87878':'var(--plum)'} style={{ flex:1 }}>
                  {recording ? '⏹ Stop' : '⏺ Record'}
                </Btn>
              ) : (
                <>
                  <Btn onClick={saveVideo} bg='#6aaf98' disabled={saving} style={{ flex:1 }}>
                    {saving ? <span className="pulse-anim">Saving…</span> : <><span style={{width:18,height:18}}><I.Check /></span> Save</>}
                  </Btn>
                  <Btn onClick={reset} bg='var(--amber-l)' color='#a87030' style={{ flex:1 }}>Redo</Btn>
                </>
              )}
              <Btn onClick={()=>{setShowAdd(false);reset();setRec(false);}} bg='#ede9e3' color='var(--muted)' style={{ padding:'12px 14px' }}>✕</Btn>
            </div>
          </div>
        )}
        {(data.anchorVideos||[]).map(v => (
          <AnchorCard key={v.id} v={v}
            isDefault={data.defaultAnchorId===v.id}
            onSetDefault={()=>update(p=>({...p,defaultAnchorId:v.id}))}
            onDelete={()=>del(v)} />
        ))}
        {!(data.anchorVideos||[]).length && !showAdd && (
          <div style={{ textAlign:'center', padding:'40px 0', display:'flex', flexDirection:'column', gap:10, alignItems:'center' }}>
            <span style={{ fontSize:48 }}>🎬</span>
            <p style={{ color:'var(--muted)', fontWeight:700 }}>No anchor videos yet</p>
          </div>
        )}
      </div>
    </div>
  );
}

function MedicationTracker({ data, update, navigate }) {
  const [showAdd, setShowAdd] = useState(false);
  const [name, setName]       = useState('');
  const today = new Date().toDateString();

  function addMed()    { if(!name.trim()) return; update(p=>({...p,medications:[...p.medications,{id:Date.now().toString(),name:name.trim(),logs:[]}]})); setName('');setShowAdd(false); }
  function logMed(id, name)  {
    const ts = Date.now();
    update(p=>({
      ...p,
      medications:p.medications.map(m=>m.id===id?{...m,logs:[...m.logs,ts]}:m),
      logs:[...(p.logs||[]),{ id:`log_${ts}`, timestamp:ts, type:'med_taken', label:name, detail:'' }],
    }));
  }
  function delMed(id)  { update(p=>({...p,medications:p.medications.filter(m=>m.id!==id)})); }

  return (
    <div className="fade-up" style={{ minHeight:'100vh', paddingBottom:100 }}>
      <Header title="Medications" onBack={()=>navigate('home')} />
      <div style={{ padding:'8px 16px', display:'flex', flexDirection:'column', gap:12 }}>
        {!showAdd ? (
          <Btn onClick={()=>setShowAdd(true)} bg='var(--plum)' style={{ width:'100%' }}>
            <span style={{ width:20, height:20 }}><I.Plus /></span> Add Medication
          </Btn>
        ) : (
          <div style={{ background:'#fff', borderRadius:18, padding:14, boxShadow:'0 2px 12px rgba(0,0,0,0.06)', display:'flex', gap:8 }}>
            <input autoFocus value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addMed()}
              placeholder="Medication name…"
              style={{ flex:1, border:'2px solid var(--border)', borderRadius:12, padding:'10px 14px', fontSize:15, color:'var(--text)', outline:'none', fontFamily:'Nunito,sans-serif' }} />
            <Btn onClick={addMed} bg='var(--plum)' style={{ padding:'10px 16px', fontSize:14 }}>Add</Btn>
            <Btn onClick={()=>{setShowAdd(false);setName('');}} bg='#ede9e3' color='var(--muted)' style={{ padding:'10px 14px', fontSize:14 }}>✕</Btn>
          </div>
        )}
        {data.medications.map(med => {
          const todayLogs = med.logs.filter(l=>new Date(l).toDateString()===today);
          const lastLog   = med.logs.length>0 ? Math.max(...med.logs) : null;
          return (
            <div key={med.id} style={{ background:'#fff', borderRadius:20, padding:18, boxShadow:'0 2px 14px rgba(0,0,0,0.065)' }}>
              <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:14 }}>
                <div>
                  <p style={{ fontSize:17, fontWeight:800 }}>{med.name}</p>
                  {lastLog && <p style={{ fontSize:12, color:'var(--muted)', marginTop:3, fontWeight:600 }}>Last taken: {fmt.dateTime(lastLog)}</p>}
                </div>
                <button onClick={()=>delMed(med.id)} className="press" style={{ background:'var(--rose-l)', borderRadius:10, border:'none', width:34, height:34, display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <span style={{ width:16, height:16, color:'var(--rose)' }}><I.Trash /></span>
                </button>
              </div>
              <Btn onClick={()=>logMed(med.id, med.name)} bg='var(--plum)' style={{ width:'100%', fontSize:17 }}>
                <span style={{ fontSize:22 }}>💊</span> I took this
              </Btn>
              {todayLogs.length>0 && (
                <div style={{ marginTop:12 }}>
                  <p style={{ fontSize:11, fontWeight:800, color:'var(--muted)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:6 }}>Today — {todayLogs.length}×</p>
                  <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                    {todayLogs.map((l,i) => <span key={i} style={{ fontSize:12, fontWeight:700, padding:'5px 10px', borderRadius:50, background:'var(--plum-l)', color:'var(--plum)' }}>{fmt.time(l)}</span>)}
                  </div>
                </div>
              )}
            </div>
          );
        })}
        {data.medications.length===0 && !showAdd && (
          <div style={{ textAlign:'center', padding:'48px 0', display:'flex', flexDirection:'column', alignItems:'center', gap:10 }}>
            <span style={{ fontSize:48 }}>💊</span>
            <p style={{ color:'var(--muted)', fontWeight:700 }}>No medications added yet</p>
          </div>
        )}
      </div>
    </div>
  );
}

  const recentMems = [...data.memories].sort((a,b)=>b.timestamp-a.timestamp).slice(0,15);

          <p style={{ color:'#3d8a72', fontWeight:700, marginTop:10 }}>Here is the evidence.</p>

        </>}
        <p style={{ fontSize:12, fontWeight:800, color:'var(--muted)', letterSpacing:'0.08em', textTransform:'uppercase', marginTop:4 }}>📌 Recent memories</p>
        {recentMems.length>0
          ? recentMems.map(m=><MemCard key={m.id} mem={m} expanded={expandedId===m.id} onToggle={()=>toggle(m.id)} />)

// ─── CALENDAR ─────────────────────────────────────────────────────────────────
function CalendarScreen({ data, navigate }) {
  const [viewDate, setViewDate]   = useState(new Date());
  const [selectedDay, setSelected] = useState(new Date().getDate());

  const year  = viewDate.getFullYear();
  const month = viewDate.getMonth();
  const firstDow    = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const today       = new Date();
  const isThisMonth = today.getMonth()===month && today.getFullYear()===year;

  // Which tasks show on a given calendar date?
  function tasksForDate(dayNum) {
    const d   = new Date(year, month, dayNum);
    const dow = d.getDay();
    const dateStr = d.toDateString();
    return (data.tasks||[]).filter(t => {
      if (t.active === false && t.recur === 'once') return false;
      if (t.recur === 'daily')    return true;
      if (t.recur === 'weekdays') return dow >= 1 && dow <= 5;
      if (t.recur === 'weekly' || t.recur === 'custom') return (t.days||[]).includes(dow);
      if (t.recur === 'once')     return t.nextDueAt && new Date(t.nextDueAt).toDateString() === dateStr;
      return false;
    });
  }

  // Memories on a given date
  function memsForDate(dayNum) {
    const dateStr = new Date(year, month, dayNum).toDateString();
    return (data.memories||[]).filter(m => new Date(m.timestamp).toDateString() === dateStr);
  }

  const cells = [];
  for (let i=0; i<firstDow; i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) cells.push(d);

  const selTasks = selectedDay ? tasksForDate(selectedDay) : [];
  const selMems  = selectedDay ? memsForDate(selectedDay)  : [];

  return (
    <div className="fade-up" style={{ minHeight:'100vh', paddingBottom:90 }}>
      <Header title="Calendar" onBack={()=>navigate('home')} />
      <div style={{ padding:'0 16px' }}>

        {/* Month navigator */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12, padding:'0 4px' }}>
          <button onClick={()=>setViewDate(new Date(year,month-1,1))} className="press"
            style={{ background:'#ede9e3', border:'none', borderRadius:12, padding:'8px 16px', fontWeight:900, color:'var(--text)', fontSize:20, lineHeight:1 }}>‹</button>
          <p style={{ fontSize:17, fontWeight:800 }}>
            {new Date(year,month,1).toLocaleDateString([],{ month:'long', year:'numeric' })}
          </p>
          <button onClick={()=>setViewDate(new Date(year,month+1,1))} className="press"
            style={{ background:'#ede9e3', border:'none', borderRadius:12, padding:'8px 16px', fontWeight:900, color:'var(--text)', fontSize:20, lineHeight:1 }}>›</button>
        </div>

        {/* Day-of-week headers */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', marginBottom:4 }}>
          {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>(
            <p key={d} style={{ textAlign:'center', fontSize:11, fontWeight:800, color:'var(--muted)', padding:'2px 0' }}>{d}</p>
          ))}
        </div>

        {/* Day grid */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:3 }}>
          {cells.map((day,idx) => {
            if (!day) return <div key={idx} />;
            const tasks  = tasksForDate(day);
            const mems   = memsForDate(day);
            const isToday    = isThisMonth && day===today.getDate();
            const isSelected = selectedDay===day;
            return (
              <button key={idx} onClick={()=>setSelected(isSelected ? null : day)} className="press"
                style={{ borderRadius:12, border:'none', padding:'6px 2px 8px', display:'flex', flexDirection:'column', alignItems:'center', gap:2,
                  background: isSelected ? '#6aaf98' : isToday ? '#e4f2ec' : '#fff',
                  outline: isToday && !isSelected ? '2px solid #6aaf98' : 'none',
                  outlineOffset: -2,
                  boxShadow:'0 1px 4px rgba(0,0,0,0.06)' }}>
                <span style={{ fontSize:14, fontWeight: isToday ? 900 : 700,
                  color: isSelected ? '#fff' : isToday ? '#1e6b5a' : 'var(--text)' }}>{day}</span>
                <div style={{ display:'flex', gap:2, justifyContent:'center', minHeight:6 }}>
                  {tasks.length>0 && <span style={{ width:5, height:5, borderRadius:'50%', background: isSelected?'#fff':'var(--amber)' }} />}
                  {mems.length>0  && <span style={{ width:5, height:5, borderRadius:'50%', background: isSelected?'#fff':'var(--sage)' }} />}
                </div>
              </button>
            );
          })}
        </div>

        {/* Legend */}
        <div style={{ display:'flex', gap:16, padding:'10px 4px 4px', justifyContent:'center' }}>
          <span style={{ fontSize:11, fontWeight:700, color:'var(--muted)', display:'flex', alignItems:'center', gap:4 }}>
            <span style={{ width:8, height:8, borderRadius:'50%', background:'var(--amber)', display:'inline-block' }} /> Reminders
          </span>
          <span style={{ fontSize:11, fontWeight:700, color:'var(--muted)', display:'flex', alignItems:'center', gap:4 }}>
            <span style={{ width:8, height:8, borderRadius:'50%', background:'var(--sage)', display:'inline-block' }} /> Memories
          </span>
        </div>

        {/* Selected day detail */}
        {selectedDay && (
          <div style={{ marginTop:12 }}>
            <p style={{ fontSize:12, fontWeight:800, color:'var(--muted)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:10 }}>
              {new Date(year,month,selectedDay).toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'})}
            </p>

            {selTasks.length===0 && selMems.length===0 && (
              <p style={{ color:'var(--muted)', fontWeight:600, textAlign:'center', padding:'16px 0', fontSize:14 }}>Nothing scheduled</p>
            )}

            {selTasks.map(task => (
              <div key={task.id} style={{ background:'#fff', borderRadius:16, padding:'12px 16px', marginBottom:8, boxShadow:'0 2px 10px rgba(0,0,0,0.065)', display:'flex', alignItems:'center', gap:10 }}>
                <span style={{ fontSize:18 }}>🔔</span>
                <div style={{ flex:1 }}>
                  <p style={{ fontSize:15, fontWeight:800, color:'var(--text)' }}>{task.text}</p>
                  <p style={{ fontSize:12, color:'var(--amber)', fontWeight:700, marginTop:2 }}>
                    {task.time ? `⏰ ${task.time}  · ` : ''}{recurLabel(task)}
                  </p>
                </div>
              </div>
            ))}

            {selMems.map(m => (
              <div key={m.id} style={{ background:'#fff', borderRadius:16, padding:'12px 16px', marginBottom:8, boxShadow:'0 2px 10px rgba(0,0,0,0.065)', display:'flex', alignItems:'center', gap:10 }}>
                <span style={{ fontSize:18 }}>{({note:'📝',voice:'🎤',photo:'📷',video:'🎥'})[m.type]||'📝'}</span>
                <div style={{ flex:1, minWidth:0 }}>
                  <p style={{ fontSize:14, fontWeight:700, color:'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                    {m.type==='note' ? (m.text||'—') : `${m.type} recording`}
                  </p>
                  <p style={{ fontSize:11, color:'var(--muted)', fontWeight:600, marginTop:1 }}>{fmt.time(m.timestamp)}</p>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}
  { id:'home',      label:'Home',     icon:<I.Home /> },
  { id:'timeline',  label:'Timeline', icon:<I.Clock /> },
  { id:'ground',    label:'Ground',   icon:<I.Anchor /> },
  { id:'reminders', label:'Remind',   icon:<I.Bell /> },
  { id:'meds',      label:'Meds',     icon:<I.Pill /> },
];

// ─── APP ──────────────────────────────────────────────────────────────────────
const NAV = [
  { id:'home',      label:'Home',     icon:<I.Home /> },
  { id:'ground',    label:'Ground',   icon:<I.Anchor /> },
  { id:'reminders', label:'Remind',   icon:<I.Bell /> },
  { id:'calendar',  label:'Calendar', icon:<I.Clock /> },
  { id:'meds',      label:'Meds',     icon:<I.Pill /> },
];

function App() {
  const [screen, setScreen] = useState('home');
  const [data, update]      = useStore();
  const [alerts, setAlerts] = useState([]);   // in-app alert banner queue
  const timerRefs           = useRef({});

  // ── Global recurring timer engine ─────────────────────────────────────────
  // Runs at App level so reminders fire on any screen.
  useEffect(() => {
    Object.values(timerRefs.current).forEach(clearTimeout);
    timerRefs.current = {};

    (data.tasks||[])
      .filter(t => t.active !== false && t.nextDueAt)
      .forEach(task => {
        function fire() {
          const ts   = Date.now();
          const next = task.recur !== 'once' ? computeNextDue(task, ts + 500) : null;
          setAlerts(a => [...a, { id: ts.toString(), text: task.text }]);
          update(p => ({
            ...p,
            tasks: p.tasks.map(t => t.id===task.id
              ? { ...t, lastFiredAt:ts, nextDueAt:next, active: task.recur!=='once' }
              : t),
            logs: [...(p.logs||[]), { id:`rtrig_${task.id}_${ts}`, timestamp:ts, type:'reminder_triggered', label:task.text, detail:'' }],
          }));
        }
        const ms = task.nextDueAt - Date.now();
        if (ms <= 500 && !task.lastFiredAt) { fire(); }
        else if (ms > 0) { timerRefs.current[task.id] = setTimeout(fire, ms); }
      });

    return () => Object.values(timerRefs.current).forEach(clearTimeout);
  }, [data.tasks]);

  function dismissAlert(id) { setAlerts(a => a.filter(x => x.id !== id)); }

  const props = { data, update, navigate: setScreen };
  const screens = {
    home:      <HomeScreen        {...props} />,
    add:       <AddMemory         {...props} />,
    timeline:  <UnifiedTimeline   {...props} />,
    ground:    <GroundMe          {...props} />,
    anchor:    <AnchorVideos      {...props} />,
    meds:      <MedicationTracker {...props} />,
    reminders: <Reminders         {...props} />,
    calendar:  <CalendarScreen    {...props} />,
    proof:     <ProofImOkay       {...props} />,
    settings:  <Settings          {...props} />,
  };

  return (
    <div style={{ maxWidth:480, margin:'0 auto', minHeight:'100vh', background:'var(--bg)' }}>
      <AlertBanner alerts={alerts} onDismiss={dismissAlert} />
      <div style={{ overflowY:'auto', minHeight:'100vh', paddingTop: alerts.length ? 74 : 0, transition:'padding-top 0.2s' }}>
        {screens[screen] || screens.home}
      </div>
      <nav style={{ position:'fixed', bottom:0, left:'50%', transform:'translateX(-50%)',
        width:'100%', maxWidth:480, background:'rgba(247,244,240,0.96)', backdropFilter:'blur(16px)',
        borderTop:'1px solid var(--border)', zIndex:200, paddingBottom:'env(safe-area-inset-bottom)' }}>
        <div style={{ display:'flex', justifyContent:'space-around', padding:'8px 4px 10px' }}>
          {NAV.map(item => {
            const active = screen===item.id;
            return (
              <button key={item.id} onClick={()=>setScreen(item.id)} className="press"
                style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:3, padding:'4px 12px',
                  border:'none', background:'none', color: active ? 'var(--sage)' : 'var(--muted)' }}>
                <span style={{ width:24, height:24 }}>{item.icon}</span>
                <span style={{ fontSize:11, fontWeight:800 }}>{item.label}</span>
                {active && <span style={{ width:4, height:4, borderRadius:'50%', background:'var(--sage)', marginTop:1 }} />}
              </button>
            );
          })}
        </div>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
